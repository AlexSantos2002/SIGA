<!-- 
  Página de registo de organização para criar uma conta associada a uma organização e ao seu administrador principal
-->

<section class="pagina-registo">
  <div class="container-registo">

    <!-- Cabeçalho da página -->
    <div class="cabecalho-registo">
      <p class="etiqueta-registo" i18n>REGISTO</p>

      <h1 i18n>Criar conta da organização</h1>

      <div class="linha-registo"></div>

      <p class="descricao-registo" i18n>
        Preencha os dados da organização e do administrador principal para criar
        a conta inicial no SIGA.
      </p>
    </div>

    <!--Formulário de registo-->
    <form [formGroup]="form" (ngSubmit)="register()" class="formulario-registo">

      <!--Dados da organização-->
      <div class="secao-formulario">
        <h2 i18n>Dados da organização</h2>

        <div class="linha-formulario">
          <div class="grupo-campo">
            <label for="nomeOrganizacao" i18n>Nome da organização</label>
            <input
              id="nomeOrganizacao"
              type="text"
              placeholder="Associação Patas Seguras"
              formControlName="name"
              i18n-placeholder
            />
          </div>

          <div class="grupo-campo">
            <label for="emailOrganizacao" i18n>Email da organização</label>
            <input
              id="emailOrganizacao"
              type="email"
              placeholder="contacto@organizacao.pt"
              formControlName="email"
            />
          </div>
        </div>

        <div class="linha-formulario">
          <div class="grupo-campo">
            <label for="telefone" i18n>Telefone</label>
            <input
              id="telefone"
              type="text"
              placeholder="912345678"
              formControlName="phone"
            />
          </div>

          <div class="grupo-campo">
            <label for="morada" i18n>Morada</label>
            <input
              id="morada"
              type="text"
              placeholder="Rua das Flores, 10"
              formControlName="address"
              i18n-placeholder
            />
          </div>
        </div>
      </div>

      <!--Dados do administrador-->
      <div class="secao-formulario">
        <h2 i18n>Administrador principal</h2>

        <div class="linha-formulario">
          <div class="grupo-campo">
            <label for="nomeAdmin" i18n>Nome</label>
            <input
              id="nomeAdmin"
              type="text"
              placeholder="Nome do responsável"
              formControlName="adminName"
              i18n-placeholder
            />
          </div>

          <div class="grupo-campo">
            <label for="emailAdmin" i18n>Email de acesso</label>
            <input
              id="emailAdmin"
              type="email"
              placeholder="email@exemplo.pt"
              formControlName="adminEmail"
            />
          </div>
        </div>

        <div class="linha-formulario">
          <div class="grupo-campo">
            <label for="password" i18n>Palavra-passe</label>
            <input
              id="password"
              type="password"
              placeholder="Introduza a palavra-passe"
              formControlName="adminPassword"
              i18n-placeholder
            />
          </div>

          <div class="grupo-campo">
            <label for="confirmarPassword" i18n>Confirmar palavra-passe</label>
            <input
              id="confirmarPassword"
              type="password"
              placeholder="Repita a palavra-passe"
              i18n-placeholder
            />
          </div>
        </div>
      </div>

      <!-- Confirmação de dados -->
      <label class="grupo-checkbox">
        <input type="checkbox" />
        <span i18n>
          Confirmo que os dados introduzidos são verdadeiros e pertencem à
          organização registada.
        </span>
      </label>

      <!-- Ações do formulário -->
      <div class="acoes-formulario">
        <button type="submit" class="botao-submeter" i18n>
          Criar conta
        </button>

        <a routerLink="/login" class="link-login" i18n>
          Já tenho conta
        </a>
      </div>

    </form>
  </div>
</section>
