<div class="flex flex-col items-start gap-y-1">
  <button class="bg-blue-300 rounded p-1" (click)="register()">register</button>
  <button class="bg-green-300 rounded p-1" (click)="getAllAnimals()">get animals</button>
  <button class="bg-purple-300 rounded p-1" (click)="createBreed()">create breed</button>
  <button class="bg-gray-300 rounded p-1" (click)="getBreeds()">get breeds</button>
  <button class="bg-red-300 rounded p-1" (click)="getBreedsBasedOnSpecies()">get species breeds</button>
  <button class="bg-yellow-300 rounded p-1" (click)="editAnimal()">edit animal</button>
</div>
