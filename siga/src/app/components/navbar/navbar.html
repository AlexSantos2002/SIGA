<header class="barra-topo">
  <div class="conteudo-barra">

    <!-- Ícone e ligação à página inicial -->
    <a routerLink="/" class="logo">
      <img src="/favicon.ico" alt="Logótipo SIGA" class="logo-imagem" />
      <span class="logo-texto">SIGA</span>
    </a>

    <!-- Menu principal -->
    <nav class="menu-navegacao">
      <a routerLink="/" i18n>Início</a>
      <a routerLink="/faq" i18n>FAQ</a>
      <a routerLink="/about" i18n>Sobre</a>
      <a routerLink="/contacts" i18n>Contactos</a>
    </nav>

    <!-- Ações do utilizador -->
    <div class="acoes-barra">

      <!-- Botão de troca de idioma -->
      <div class="language-switcher">
        <button type="button" class="botao-linguagem" (click)="toggleLangMenu()" i18n>
          PT | EN
        </button>

        <div class="menu-linguagem" *ngIf="showLangMenu">
          <button type="button" (click)="changeLang('pt')" i18n>Português</button>
          <button type="button" (click)="changeLang('en')" i18n>English</button>
        </div>
      </div>

      <a routerLink="/login" class="link-entrar" i18n>Entrar</a>
      <a routerLink="/register" class="botao-topo" i18n>Começar agora</a>
    </div>

  </div>
</header>
