<!doctype html>

<!-- 
  Este ficheiro define a estrutura base carregada pelo browser e é depois renderizado pelo Angular
-->

<html lang="pt-PT">
<head>
  <!-- Tipo de carcteres -->
  <meta charset="utf-8">

  <!-- 
    Descrição da aplicação para motores de busca para aparecer nos resultados do google
  -->
  <meta name="description" content="Plataforma SIGA para gestão de adoções de animais">

  <!-- Título que fica na aba da página -->
  <title>SIGA</title>

  <!-- Base de navegação para o Angular Router -->
  <base href="/">

  <!-- Adaptação para telemoveis e outros dispositivos moveis -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Icon da aplicação-->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
  <app-root></app-root>
</body>
</html>
